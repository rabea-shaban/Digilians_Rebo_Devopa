name: build-deploy

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "Hello App" > app.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: app.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-app

      - name: Read file
        run: cat app.txt