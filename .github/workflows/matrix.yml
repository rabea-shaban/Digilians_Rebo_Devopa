name: matrix-test

on:
  push:

jobs:
  test:
    strategy:
      fail-fast: false
      max-parallel: 3

      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

        python:
          - '3.10'
          - '3.11'
          - '3.12'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Check Python Version
        run: python --version
